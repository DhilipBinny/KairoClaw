<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 320px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 16px; }
    .header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .header img { width: 28px; height: 28px; border-radius: 6px; }
    .header h1 { font-size: 15px; font-weight: 600; }
    .status { display: flex; align-items: center; gap: 8px; padding: 10px 12px; border-radius: 8px; margin-bottom: 12px; font-size: 13px; }
    .status.connected { background: rgba(34, 197, 94, 0.15); color: #4ade80; }
    .status.disconnected { background: rgba(100, 100, 100, 0.15); color: #999; }
    .status.error { background: rgba(239, 68, 68, 0.15); color: #f87171; }
    .status .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .status.connected .dot { background: #22c55e; }
    .status.disconnected .dot { background: #666; }
    .status.error .dot { background: #ef4444; }
    .form-group { margin-bottom: 12px; }
    label { display: block; font-size: 11px; color: #999; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    input { width: 100%; padding: 8px 10px; background: #16213e; border: 1px solid #333; border-radius: 6px; color: #e0e0e0; font-size: 13px; outline: none; }
    input:focus { border-color: #6366f1; }
    input::placeholder { color: #555; }
    .btn { width: 100%; padding: 8px; border: none; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; margin-top: 4px; }
    .btn-primary { background: #6366f1; color: white; }
    .btn-primary:hover { background: #4f46e5; }
    .btn-danger { background: transparent; color: #f87171; border: 1px solid #f87171; }
    .btn-danger:hover { background: rgba(239, 68, 68, 0.1); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .info { font-size: 11px; color: #666; margin-top: 12px; text-align: center; }
  </style>
</head>
<body>
  <div class="header">
    <h1>KairoClaw Browser Bridge</h1>
  </div>

  <div id="status" class="status disconnected">
    <span class="dot"></span>
    <span id="status-text">Not connected</span>
  </div>

  <div class="form-group">
    <label>Server URL</label>
    <input id="serverUrl" type="url" placeholder="https://your-kairo-server.com" />
  </div>

  <div class="form-group">
    <label>API Key</label>
    <input id="apiKey" type="password" placeholder="agw_sk_..." />
  </div>

  <button id="connectBtn" class="btn btn-primary">Connect</button>
  <button id="disconnectBtn" class="btn btn-danger" style="display:none; margin-top: 8px;">Disconnect</button>

  <p class="info">Connects your browser to KairoClaw so the AI agent can browse with your real cookies and sessions.</p>

  <script src="popup.js"></script>
</body>
</html>
