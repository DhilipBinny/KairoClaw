<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 380px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0f0f1a;
      color: #f0f0f5;
      animation: fadeIn 150ms ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

    /* Header */
    .header {
      display: flex; align-items: center; gap: 10px;
      padding: 16px 20px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .header-logo { width: 24px; height: 24px; border-radius: 6px; background: #6366f1; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; color: white; }
    .header-text h1 { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; }
    .header-text span { font-size: 11px; color: #6b6b80; }
    .header-actions { margin-left: auto; }
    .btn-icon { background: none; border: none; color: #6b6b80; cursor: pointer; padding: 4px; border-radius: 6px; display: flex; }
    .btn-icon:hover { background: rgba(255,255,255,0.06); color: #a0a0b8; }

    /* Status card */
    .status-card {
      margin: 16px 20px;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.06);
      display: flex; align-items: center; gap: 12px;
      transition: background 300ms, border-color 300ms;
    }
    .status-card.connected { background: rgba(34,197,94,0.08); border-color: rgba(34,197,94,0.15); }
    .status-card.disconnected { background: rgba(255,255,255,0.03); }
    .status-card.connecting { background: rgba(245,158,11,0.08); border-color: rgba(245,158,11,0.15); }
    .status-card.error { background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.15); }

    .status-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
      transition: background 300ms;
    }
    .connected .status-dot { background: #22c55e; animation: pulse 2s ease-in-out infinite; }
    .disconnected .status-dot { background: #6b6b80; }
    .connecting .status-dot { background: #f59e0b; animation: pulse 1s ease-in-out infinite; }
    .error .status-dot { background: #ef4444; }
    @keyframes pulse { 0%,100% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 0 currentColor; } 50% { transform: scale(1.3); opacity: 0.7; } }

    .status-info { flex: 1; min-width: 0; }
    .status-label { font-size: 14px; font-weight: 500; }
    .status-detail { font-size: 11px; color: #6b6b80; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Activity */
    .activity {
      margin: 0 20px 16px;
      padding: 10px 14px;
      background: rgba(255,255,255,0.03);
      border-radius: 10px;
      display: flex; align-items: center; gap: 10px;
      font-size: 12px; color: #a0a0b8;
    }
    .activity-icon { font-size: 14px; }
    .activity-stat { font-weight: 600; color: #f0f0f5; }

    /* Actions */
    .actions {
      margin: 0 20px 16px;
      display: flex; gap: 8px;
    }
    .btn {
      flex: 1; padding: 10px; border: none; border-radius: 8px;
      font-size: 13px; font-weight: 500; cursor: pointer;
      transition: background 150ms, transform 150ms;
      font-family: inherit;
    }
    .btn:hover { transform: scale(1.02); }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-primary { background: #6366f1; color: white; }
    .btn-primary:hover { background: #4f46e5; }
    .btn-secondary { background: rgba(255,255,255,0.06); color: #a0a0b8; }
    .btn-secondary:hover { background: rgba(255,255,255,0.1); }
    .btn-danger { background: transparent; color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
    .btn-danger:hover { background: rgba(239,68,68,0.1); }

    /* Settings form */
    .settings {
      margin: 0 20px 16px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-group label { font-size: 11px; color: #6b6b80; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; }
    .input-wrap { position: relative; }
    input {
      width: 100%; padding: 9px 12px;
      background: #1a1a2e; border: 1px solid rgba(255,255,255,0.08); border-radius: 8px;
      color: #f0f0f5; font-size: 13px; font-family: inherit; outline: none;
      transition: border-color 150ms, box-shadow 150ms;
    }
    input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
    input::placeholder { color: #4a4a5a; }
    .input-toggle {
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: #6b6b80; cursor: pointer; padding: 2px;
      font-size: 16px;
    }

    /* Footer */
    .footer {
      padding: 10px 20px;
      border-top: 1px solid rgba(255,255,255,0.04);
      font-size: 10px; color: #4a4a5a; text-align: center;
    }

    /* Visibility */
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="header-logo">K</div>
    <div class="header-text">
      <h1>KairoClaw</h1>
      <span>Browser Bridge</span>
    </div>
    <div class="header-actions">
      <button class="btn-icon" id="settingsBtn" title="Settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
  </div>

  <!-- Status Card -->
  <div id="statusCard" class="status-card disconnected">
    <div class="status-dot"></div>
    <div class="status-info">
      <div class="status-label" id="statusLabel">Disconnected</div>
      <div class="status-detail" id="statusDetail">Click Connect to start</div>
    </div>
  </div>

  <!-- Activity (shown when connected) -->
  <div id="activitySection" class="activity hidden">
    <span class="activity-icon">&#9889;</span>
    <span>Last activity: <span class="activity-stat" id="lastActivity">—</span></span>
  </div>

  <!-- Connected Actions -->
  <div id="connectedActions" class="actions hidden">
    <button class="btn btn-secondary" id="dashboardBtn">Open Dashboard</button>
    <button class="btn btn-danger" id="disconnectBtn">Disconnect</button>
  </div>

  <!-- Settings Form (shown when disconnected or via gear) -->
  <div id="settingsSection" class="settings">
    <div class="form-group">
      <label>Server URL</label>
      <input id="serverUrl" type="url" placeholder="http://your-server:18181" />
    </div>
    <div class="form-group">
      <label>API Key</label>
      <div class="input-wrap">
        <input id="apiKey" type="password" placeholder="agw_sk_..." />
        <button class="input-toggle" id="toggleKey" title="Show/hide">&#128065;</button>
      </div>
    </div>
    <button class="btn btn-primary" id="connectBtn">Connect</button>
  </div>

  <!-- Footer -->
  <div class="footer">KairoClaw Browser Bridge v1.0.0</div>

  <script src="popup.js"></script>
</body>
</html>
