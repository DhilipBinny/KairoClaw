# Deploy KairoClaw to local server (192.168.88.110)
# Only runs AFTER the CI workflow passes — broken code never deploys
# Also triggerable manually via workflow_dispatch

name: Deploy to Local Server

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [deploy/railway]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: self-hosted
    timeout-minutes: 15
    # Only deploy if CI passed on deploy/railway (or if manually triggered)
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'deploy/railway')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch || github.ref }}

      - name: Build Docker image
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          docker tag kairoclaw:latest kairoclaw:prev 2>/dev/null || true
          # Use BuildKit secret — token never baked into image layers
          echo "$GITHUB_PKG_TOKEN" > /tmp/.github_token
          DOCKER_BUILDKIT=1 docker build \
            --secret id=github_token,src=/tmp/.github_token \
            -t kairoclaw:latest -t kairoclaw:$SHORT_SHA .
          rm -f /tmp/.github_token
          echo "Built kairoclaw:$SHORT_SHA"
        env:
          GITHUB_PKG_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Deploy stack
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          # Update compose to use SHA-tagged image so Swarm detects the change
          sed -i "s|image: kairoclaw:.*|image: kairoclaw:$SHORT_SHA|" /home/binny/Binny/KAIROCLAW/docker-compose.yml
          docker stack deploy -c /home/binny/Binny/KAIROCLAW/docker-compose.yml kairoclaw
          echo "Deployed kairoclaw:$SHORT_SHA"

      - name: Cleanup previous image
        run: |
          docker rmi kairoclaw:prev 2>/dev/null || true
          # Keep last 3 tagged images, remove older ones
          docker images kairoclaw --format '{{.Tag}} {{.ID}}' | grep -v latest | grep -v prev | tail -n +4 | awk '{print $2}' | xargs -r docker rmi 2>/dev/null || true

      - name: Wait for healthy
        run: |
          echo "Waiting for container to start..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:18181/api/v1/health > /dev/null 2>&1; then
              echo "KairoClaw is healthy"
              docker stack services kairoclaw
              exit 0
            fi
            sleep 2
          done
          echo "Health check timed out (may still be starting)"
          docker stack services kairoclaw
