# CI — lint, type-check, build, and security audit on every push and PR
# Catches bugs, type errors, and vulnerabilities before deploy

name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Install dependencies
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GH_PACKAGES_TOKEN }}" >> .npmrc
          pnpm install --frozen-lockfile
          sed -i '/_authToken/d' .npmrc
      - run: pnpm lint

  typecheck-and-build:
    name: Type-check & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Install dependencies
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GH_PACKAGES_TOKEN }}" >> .npmrc
          pnpm install --frozen-lockfile
          sed -i '/_authToken/d' .npmrc

      - name: Build types
        run: pnpm --filter @agw/types build

      - name: Type-check core
        run: pnpm --filter @agw/core typecheck

      - name: Build core
        run: pnpm --filter @agw/core build

      - name: Build UI
        run: pnpm --filter @agw/ui build

  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: typecheck-and-build
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Install dependencies
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GH_PACKAGES_TOKEN }}" >> .npmrc
          pnpm install --frozen-lockfile
          sed -i '/_authToken/d' .npmrc

      - name: Build types (needed for imports)
        run: pnpm --filter @agw/types build

      - name: Run tests
        run: pnpm test

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Install dependencies
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GH_PACKAGES_TOKEN }}" >> .npmrc
          pnpm install --frozen-lockfile
          sed -i '/_authToken/d' .npmrc

      - name: Dependency audit
        run: pnpm audit --prod || true
        # non-blocking for now — logs vulnerabilities but doesn't fail CI
