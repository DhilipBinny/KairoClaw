# Development compose — test PostgreSQL locally
# Usage:
#   docker compose -f docker-compose.dev.yml up --build    # start everything
#   docker compose -f docker-compose.dev.yml down          # stop
#   sudo rm -rf dev-data dev-pgdata                        # clean slate
#
# Fresh install with PostgreSQL. Existing agw-data NOT touched.

services:
  kairoclaw:
    build: .
    ports:
      - "18282:18181"
    environment:
      AGW_STATE_DIR: /data
      AGW_CONFIG: /data/config.json
      AGW_DATABASE_URL: postgres://kairo:kairo_dev_pass@db:5432/kairoclaw
      LOG_LEVEL: info
    user: "0:0"
    volumes:
      - ./dev-data:/data
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18181/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: kairoclaw
      POSTGRES_USER: kairo
      POSTGRES_PASSWORD: kairo_dev_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "15432:5432"
    healthcheck:
      test: pg_isready -U kairo -d kairoclaw
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
